<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeuPomo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <section>
            <h1 id="logo">Meu<strong>Pomo</strong></h1>
            <nav id="tab">
                <button>Foco</button>
                <button>Pausa</button>
                <button>Descanso</button>
            </nav>
            <div class="timer"></div>
            <div class="buttons">
                <button><img src="icons/arrow-clockwise-fill.svg" alt="Resetar tempo"></button>
                <button><img src="icons/play-fill.svg" alt="Começar o timer"></button>
                <button><img src="icons/fast-forward-fill.svg" alt="Passar para o próximo timer"></button>
            </div>
        </section>
        <aside>

        </aside>
    </main>
</body>
</html>

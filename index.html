<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeuPomo</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body class="modo-foco">
    <main>
        <section>
            <h1 id="logo">Meu<strong>Pomo</strong></h1>
            <nav id="tab">
                <button id="foco" class="texto-subtitle active-tab">Foco</button>
                <button id="pausa" class="texto-subtitle">Pausa</button>
                <button id="descanso" class="texto-subtitle">Descanso</button>
            </nav>
            <div id="timer" class="texto-timer">25:00</div>
            <div id="buttons">
                <button id="button-reset"><img src="icons/arrow-clockwise-fill.svg" alt="Resetar tempo"></button>
                <button id="button-play"><img src="icons/play-fill.svg" alt="Começar o timer" id="img-botao-play"></button>
                <button id="button-forward"><img src="icons/fast-forward-fill.svg" alt="Passar para o próximo timer"></button>
            </div>
            <div id="div-musica">
                <img src="icons/music-note-fill.svg" alt="Nota músical">
                <label for="button-musica" class="texto-small label-button-musica" id="label-musica">Ativar Música
                <button name="button-musica" class="button-musica" id="buttonmusica"><span class="span-musica" id="spanmusica"></span></button>
                </label>
            </div>
        </section>
        <aside id="card-task">
            <h2 class="texto-subtitle">Minhas tasks</h2>
            <div id="tasks-list">
                <div class="task"><span class="check-task"></span><h4 class="texto-text">Digite sua task e aperte "Enter"!</h4><img src="icons/pencil.svg" alt="Editar task"></div>
                <div class="task"><span class="check-task"></span><h4 class="texto-text">Digite sua task e aperte "Enter"!</h4><img src="icons/pencil.svg" alt="Editar task"></div>
                <div class="task"><span class="check-task"></span><h4 class="texto-text">Digite sua task e aperte "Enter"!</h4><img src="icons/pencil.svg" alt="Editar task"></div>
                <div class="task"><span class="check-task"></span><h4 class="texto-text">Digite sua task e aperte "Enter"!</h4><img src="icons/pencil.svg" alt="Editar task"></div>
                <div class="task"><span class="check-task"></span><h4 class="texto-text">Digite sua task e aperte "Enter"!</h4><img src="icons/pencil.svg" alt="Editar task"></div>
            </div>
            <form id="task-form">
                <fieldset>
                    <label for="task-input" class="task-label texto-small">Nova task</label>
                    <input type="text" name="task-input" id="task-input">
                    <div id="buttons-input"><button id="button-excluir" class="texto-button">Excluir</button>
                    <button id="button-cancelar" class="texto-button">Cancelar</button>
                    <button id="button-salvar" class="texto-button">Salvar</button></div>
                </fieldset>
            </form>
            <button id="button-adicionar-task" class="texto-text">
                <span><img src="icons/plus.svg" alt="Ícone de Adicionar task"></span>
                Adicionar task
            </button>
        </aside>
    </main>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeuPomo</title>
    <link rel="shortcut icon" href="icons/favicon.svg" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body class="modo-foco">
    <main>
        <section>
            <h1 id="logo">Meu<strong>Pomo</strong></h1>
            <nav id="tab">
                <button id="foco" class="texto-subtitle active-tab">Foco</button>
                <button id="pausa" class="texto-subtitle">Pausa</button>
                <button id="descanso" class="texto-subtitle">Descanso</button>
            </nav>
            <div id="timer" class="texto-timer">25:00</div>
            <div id="buttons">
                <button id="button-reset"><img src="icons/arrow-clockwise-fill.svg" alt="Resetar tempo"></button>
                <button id="button-play"><img src="icons/play-fill.svg" alt="Começar o timer" id="img-botao-play"></button>
                <button id="button-forward"><img src="icons/fast-forward-fill.svg" alt="Passar para o próximo timer"></button>
            </div>
            <div id="div-musica">
                <img src="icons/music-note-fill.svg" alt="Nota músical">
                <label for="button-musica" class="texto-small" id="label-musica"><p>Ativar Música</p>
                <button name="button-musica" class="button-musica" id="buttonmusica"><span class="span-musica" id="spanmusica"></span></button>
                </label>
            </div>
        </section>
        <aside id="card-task">
            <div id="minhas-tasks">
                <h2 class="texto-subtitle">Minhas tasks</h2>
                <div id="dropdown">
                    <button onclick="opcoesEditar()"><img class="editar-todas-tasks" src="icons/dots-three-outline-vertical-fill.svg" alt="Editar todas as tasks"></button>
                    <div id="container-dropdown" class="hidden">
                        <button id="dropdown-1" class="opcoes-dropdown" onclick="removerTodas()">Remover todas as tasks</button>
                        <button id="dropdown-2" class="opcoes-dropdown" onclick="removerConcluidas()">Remover tasks concluídas</button>
                    </div>
                    </div>
            </div>
            <div id="tasks-list" class="hidden task-list-vazia">
            </div>
            <div id="illust-tasks-vazias">
                <img src="icons/cat.svg" alt="Sem tasks">
                <h3 class="texto-subtitle">Ops!</h3>
                <p class="texto-text">Parece que não tem nenhuma task aqui... <br>Clique no botão abaixo para criar uma task!</p>
            </div>
            <form id="task-form" class="hidden">
                <fieldset>
                    <input type="hidden" id="edit-id">
                    <label for="task-input" class="task-label texto-small" id="label-input">Nova task</label>
                    <textarea maxlength="35" name="task-input" id="task-input" placeholder="Qual é a nossa task? (Máx. 35 caracteres)" class="texto-text"></textarea>
                    <div id="buttons-input"><button id="button-excluir" class="texto-button hidden" type="button">Excluir</button>
                    <button id="button-cancelar" class="texto-button" type="reset">Cancelar</button>
                    <button id="button-salvar" class="texto-button" type="submit">Salvar</button></div>
                </fieldset>
            </form>
            <button id="button-adicionar-task" class="texto-text">
                <span><img src="icons/plus.svg" alt="Ícone de Adicionar task"></span>
                Adicionar task
            </button>
        </aside>
    </main>
    <footer>
        <p class="texto-button">Desenvolvido por Isabelle N.</p>
        <a href="https://github.com/isaonline" class="svg-logos">

        </a>
        <a href="https://www.linkedin.com/in/isanasc/" class="svg-logos">
            <svg id="linkedin-logo" xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="#000000" viewBox="0 0 256 256"><path d="M216,24H40A16,16,0,0,0,24,40V216a16,16,0,0,0,16,16H216a16,16,0,0,0,16-16V40A16,16,0,0,0,216,24ZM96,176a8,8,0,0,1-16,0V112a8,8,0,0,1,16,0ZM88,96a12,12,0,1,1,12-12A12,12,0,0,1,88,96Zm96,80a8,8,0,0,1-16,0V140a20,20,0,0,0-40,0v36a8,8,0,0,1-16,0V112a8,8,0,0,1,15.79-1.78A36,36,0,0,1,184,140Z"></path></svg>

    </footer>
</body>
</html>
